<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c1a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SafeStreet — Wheelchair Navigation Amman</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:       #0c1a0e;
  --surface:  #111f13;
  --s2:       #162119;
  --border:   rgba(255,255,255,0.07);
  --text:     #e8f0e9;
  --muted:    rgba(232,240,233,0.4);
  --safe:     #2ecc71;
  --unsafe:   #e74c3c;
  --route:    #3b9eff;
  --warn:     #f39c12;
  --accent:   #1db954;
  --r:        14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  overflow: hidden;
}

/* ── Map ── */
#map {
  position: absolute; inset: 0; z-index: 0;
}
.leaflet-tile { filter: brightness(0.5) saturate(0.4) hue-rotate(80deg); }
.leaflet-container { background: #0a130b; }
.leaflet-control-zoom { display: none; }

/* ── Top panel ── */
#top-panel {
  position: absolute; top: 0; left: 0; right: 0; z-index: 100;
  padding: 14px 14px 0;
  pointer-events: none;
}

.search-card {
  background: rgba(12, 26, 14, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  pointer-events: all;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}

.app-logo {
  display: flex; align-items: center; gap: 9px;
}

.logo-mark {
  width: 32px; height: 32px; border-radius: 10px;
  background: linear-gradient(135deg, #1db954, #0d7a34);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.logo-text {
  font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text);
}

.logo-sub {
  font-size: 10px; color: var(--muted); font-weight: 400;
  letter-spacing: 0.05em; text-transform: uppercase;
}

/* Search inputs */
.search-inputs { display: flex; flex-direction: column; gap: 8px; }

.input-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 12px;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: rgba(29,185,84,0.4); }

.input-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

.input-field {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; color: var(--text);
}
.input-field::placeholder { color: var(--muted); }

.input-action {
  background: transparent; border: none; cursor: pointer;
  color: var(--muted); font-size: 16px; padding: 0 2px;
  transition: color 0.15s;
}
.input-action:active { color: var(--text); }

.connector-line {
  width: 1px; height: 10px; background: var(--border);
  margin-left: 16px;
}

.btn-route {
  width: 100%; margin-top: 10px; padding: 13px;
  background: var(--accent); color: #0c1a0e;
  border: none; border-radius: 11px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s, transform 0.15s;
  letter-spacing: 0.01em;
}
.btn-route:active { transform: scale(0.98); opacity: 0.9; }
.btn-route:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Autocomplete dropdown ── */
.autocomplete-list {
  background: rgba(12,26,14,0.97);
  border: 1px solid var(--border);
  border-radius: 11px;
  margin-top: 6px;
  overflow: hidden;
  max-height: 200px;
  overflow-y: auto;
}
.autocomplete-item {
  padding: 10px 14px; font-size: 13px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  display: flex; align-items: center; gap: 8px;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: var(--s2); }
.autocomplete-item .ai-icon { font-size: 14px; flex-shrink: 0; }
.autocomplete-item .ai-name { color: var(--text); }
.autocomplete-item .ai-type { font-size: 11px; color: var(--muted); }

/* ── Bottom panel ── */
#bottom-panel {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 0 14px 14px;
  pointer-events: none;
}

/* Legend */
.legend-card {
  background: rgba(12,26,14,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 16px;
  pointer-events: all;
  margin-bottom: 10px;
}
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.leg-line { width: 20px; height: 3px; border-radius: 2px; }

/* Route info card */
#route-card {
  background: rgba(12,26,14,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  pointer-events: all;
  display: none;
}

.route-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.route-title {
  font-size: 15px; font-weight: 700; color: var(--text);
}
.btn-close {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  font-size: 12px; color: var(--muted); cursor: pointer;
}
.btn-close:active { color: var(--text); }

.route-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 14px;
}
.stat-box {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px; text-align: center;
}
.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 500;
}
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

/* Safety bar */
.safety-bar-wrap { margin-bottom: 14px; }
.safety-bar-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
}
.safety-bar {
  height: 8px; border-radius: 4px; background: var(--s2); overflow: hidden;
}
.safety-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Warning chips */
.warnings { display: flex; flex-wrap: wrap; gap: 6px; }
.warn-chip {
  background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.25);
  border-radius: 100px; padding: 4px 10px;
  font-size: 11px; color: #ff6b5b;
}
.ok-chip {
  background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.25);
  border-radius: 100px; padding: 4px 10px;
  font-size: 11px; color: var(--safe);
}

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.load-logo { font-size: 48px; animation: bounce 1.5s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.load-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700; color: var(--text);
  letter-spacing: -0.02em;
}
.load-sub { font-size: 13px; color: var(--muted); }
.load-bar {
  width: 200px; height: 3px; background: var(--s2);
  border-radius: 2px; overflow: hidden;
}
.load-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  animation: load 2s ease-in-out infinite;
}
@keyframes load { 0%{width:0%} 50%{width:70%} 100%{width:100%} }

/* ── Pin mode indicator ── */
#pin-mode {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200; pointer-events: none;
  display: none; flex-direction: column; align-items: center;
}
.pin-icon { font-size: 32px; animation: pin-drop 0.3s ease; }
@keyframes pin-drop { from{transform:translateY(-8px)} to{transform:translateY(0)} }
.pin-shadow {
  width: 16px; height: 4px; background: rgba(0,0,0,0.3);
  border-radius: 50%; margin-top: 2px;
}

#pin-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  background: var(--accent); color: #0c1a0e;
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  text-align: center; display: none;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  z-index: 500;
  background: rgba(12,26,14,0.95); border: 1px solid var(--border);
  border-radius: 100px; padding: 10px 18px;
  font-size: 13px; color: var(--text);
  backdrop-filter: blur(12px);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="load-logo">♿</div>
  <div class="load-text">SafeStreet</div>
  <div class="load-sub">Loading Amman accessibility data...</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Pin mode overlay -->
<div id="pin-mode">
  <div class="pin-icon">📍</div>
  <div class="pin-shadow"></div>
</div>
<div id="pin-banner"></div>

<!-- Top panel -->
<div id="top-panel">
  <div class="search-card">
    <div class="app-header">
      <div class="app-logo">
        <div class="logo-mark">♿</div>
        <div>
          <div class="logo-text">SafeStreet</div>
          <div class="logo-sub">Amman Accessibility</div>
        </div>
      </div>
    </div>

    <div class="search-inputs">
      <div class="input-row" id="origin-row">
        <div class="input-dot" style="background:var(--safe)"></div>
        <input class="input-field" id="origin-input" placeholder="Starting point..."
               oninput="onSearchInput('origin', this.value)"
               onfocus="onFocus('origin')" onblur="onBlur('origin')">
        <button class="input-action" onclick="setPin('origin')" title="Pick on map">+</button>
      </div>
      <div class="connector-line"></div>
      <div class="input-row" id="dest-row">
        <div class="input-dot" style="background:var(--unsafe)"></div>
        <input class="input-field" id="dest-input" placeholder="Destination..."
               oninput="onSearchInput('dest', this.value)"
               onfocus="onFocus('dest')" onblur="onBlur('dest')">
        <button class="input-action" onclick="setPin('dest')" title="Pick on map">+</button>
      </div>
      <div id="origin-list" class="autocomplete-list" style="display:none"></div>
      <div id="dest-list" class="autocomplete-list" style="display:none"></div>
    </div>

    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:6px;">
      Or tap anywhere on the map to set points
    </div>
    <button class="btn-route" id="route-btn" onclick="getRoute()" disabled>
      Find Accessible Route
    </button>
  </div>
</div>

<!-- Bottom panel -->
<div id="bottom-panel">
  <div class="legend-card">
    <div class="leg-item">
      <div class="leg-line" style="background:var(--unsafe)"></div>
      <span>Barrier</span>
    </div>
    <div class="leg-item">
      <div class="leg-line" style="background:var(--safe)"></div>
      <span>Accessible</span>
    </div>
    <div class="leg-item">
      <div class="leg-line" style="background:var(--route); height:4px;"></div>
      <span>Your route</span>
    </div>
  </div>

  <div id="route-card">
    <div class="route-header">
      <div class="route-title">Route found</div>
      <button class="btn-close" onclick="clearRoute()">Clear</button>
    </div>
    <div class="route-stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-dist">—</div>
        <div class="stat-lbl">Distance</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-time">—</div>
        <div class="stat-lbl">Est. wheelchair time</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-safety">—</div>
        <div class="stat-lbl">Safety</div>
      </div>
    </div>
    <div class="safety-bar-wrap">
      <div class="safety-bar-label">
        <span>Route safety score</span>
        <span id="safety-pct">—</span>
      </div>
      <div class="safety-bar">
        <div class="safety-fill" id="safety-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="warnings" id="route-warnings"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Replace with your actual GeoJSON URLs after hosting on GitHub Pages
// Put streets_overview.geojson and streets_detail.geojson in the same repo
const OVERVIEW_URL   = 'streets_overview.geojson';   // 0.5MB - primary/secondary
const TERTIARY_URL   = 'streets_tertiary.geojson';  // 1MB   - tertiary roads
const DETAIL_URL     = 'streets_detail.geojson';    // 20MB  - all streets (zoom 15+)
const SAFETY_GRID_URL = 'safety_grid.json';          // 0.1MB - safety lookup grid
const OSRM_BASE    = 'https://router.project-osrm.org/route/v1/foot';
const NOMINATIM    = 'https://nominatim.openstreetmap.org';
const AMMAN_CENTER = [31.95, 35.93];

// ── State ─────────────────────────────────────────────────────────────────────
let map, streetLayer, routeLayer, markersLayer;
let originCoords = null, destCoords = null;
let originMarker = null, destMarker  = null;
let pinMode = null;  // 'origin' | 'dest' | null
let detailLoaded = false;
let allStreets = [];  // GeoJSON features for route safety check
let safetyGrid = { unsafe: new Set(), steps: new Set() };  // unsafe cell index
let safetyGridCellSize = 0.002;

// ── Map init ──────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: AMMAN_CENTER, zoom: 13,
    zoomControl: false, attributionControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  streetLayer  = L.layerGroup().addTo(map);
  routeLayer   = L.layerGroup().addTo(map);
  markersLayer = L.layerGroup().addTo(map);

  map.on('click', onMapClick);
  map.on('zoomend moveend', onViewChange);
}

// ── Load street data ──────────────────────────────────────────────────────────
async function loadStreets() {
  try {
    // Load overview first (fast)
    const resp = await fetch(OVERVIEW_URL);
    if (!resp.ok) throw new Error('Overview file not found');
    const gj = await resp.json();
    allStreets = [...gj.features];
    renderStreets(allStreets);
    document.getElementById('loading').style.display = 'none';
    toast('Map loaded');

    // Load safety grid and tertiary roads in background
    loadSafetyGrid();
    loadTertiaryStreets();
  } catch (e) {
    console.error('Failed to load streets:', e);
    document.getElementById('loading').style.display = 'none';
    toast('Street data not found — check your repo files');
  }
}

async function loadSafetyGrid() {
  try {
    const resp = await fetch(SAFETY_GRID_URL);
    if (!resp.ok) return;
    const data = await resp.json();
    safetyGridCellSize = data.cell_size;
    // Convert arrays to Sets for O(1) lookup
    safetyGrid.unsafe = new Set(data.unsafe);
    safetyGrid.steps  = new Set(data.steps);
    console.log('Safety grid loaded:', safetyGrid.unsafe.size, 'unsafe cells');
  } catch (e) {
    console.warn('Safety grid not loaded:', e);
  }
}

async function loadTertiaryStreets() {
  try {
    const resp = await fetch(TERTIARY_URL);
    if (!resp.ok) return;
    const gj = await resp.json();
    allStreets = [...allStreets, ...gj.features];
    renderStreets(allStreets);
  } catch (e) {
    console.warn('Tertiary streets not loaded:', e);
  }
}

async function loadDetailStreets() {
  if (detailLoaded) return;
  detailLoaded = true;
  try {
    const resp = await fetch(DETAIL_URL);
    if (!resp.ok) return;
    const gj = await resp.json();
    allStreets = gj.features;
    renderStreets(gj.features);
  } catch (e) {
    console.warn('Detail streets not loaded:', e);
  }
}

function onViewChange() {
  const z = map.getZoom();
  if (z >= 15 && !detailLoaded) {
    loadDetailStreets();
  }
  // Re-render with zoom-appropriate styling
  if (currentFeatures.length) renderStreets(currentFeatures);
}

let currentFeatures = [];

function renderStreets(features) {
  currentFeatures = features;
  streetLayer.clearLayers();

  const z = map.getZoom();

  features.forEach(feat => {
    const label = feat.properties.l;
    const prob  = feat.properties.p || 0.5;


    const color   = label === 1 ? '#e74c3c' : '#2ecc71';
    const weight  = z >= 17 ? 5 : z >= 15 ? 3 : z >= 13 ? 2 : 2;
    const opacity = label === 1 ? 0.85 : 0.65;

    L.polyline(
      feat.geometry.coordinates.map(co => [co[1], co[0]]),
      { color, weight, opacity }
    ).addTo(streetLayer);
  });
}

// ── Search / Autocomplete ─────────────────────────────────────────────────────
let searchTimers = {};

function onSearchInput(field, val) {
  clearTimeout(searchTimers[field]);
  if (val.length < 3) {
    document.getElementById(field + '-list').style.display = 'none';
    return;
  }
  searchTimers[field] = setTimeout(() => searchPlace(field, val), 400);
}

async function searchPlace(field, query) {
  try {
    const url = `${NOMINATIM}/search?q=${encodeURIComponent(query + ', Amman, Jordan')}&format=json&limit=5&accept-language=en`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const results = await resp.json();
    showAutocomplete(field, results);
  } catch (e) {
    console.warn('Search failed:', e);
  }
}

function showAutocomplete(field, results) {
  const list = document.getElementById(field + '-list');
  if (!results.length) { list.style.display = 'none'; return; }

  list.innerHTML = '';
  results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'autocomplete-item';
    const name = r.display_name.split(',').slice(0, 2).join(',');
    item.innerHTML = `
      <span class="ai-icon">📍</span>
      <div>
        <div class="ai-name">${name}</div>
        <div class="ai-type">${r.type || ''}</div>
      </div>`;
    item.addEventListener('mousedown', () => {
      selectPlace(field, parseFloat(r.lat), parseFloat(r.lon), name);
    });
    list.appendChild(item);
  });
  list.style.display = 'block';
}

function selectPlace(field, lat, lon, name) {
  document.getElementById(field + '-input').value = name;
  document.getElementById(field + '-list').style.display = 'none';
  if (field === 'origin') {
    originCoords = [lat, lon];
    placeMarker('origin', lat, lon);
  } else {
    destCoords = [lat, lon];
    placeMarker('dest', lat, lon);
  }
  checkRouteReady();
}

function onFocus(field) {
  const val = document.getElementById(field + '-input').value;
  if (val.length >= 3) {
    const list = document.getElementById(field + '-list');
    if (list.children.length) list.style.display = 'block';
  }
}

function onBlur(field) {
  setTimeout(() => {
    document.getElementById(field + '-list').style.display = 'none';
  }, 200);
}

// ── Pin on map ────────────────────────────────────────────────────────────────
function setPin(field) {
  pinMode = field;
  document.getElementById('pin-mode').style.display = 'flex';
  const banner = document.getElementById('pin-banner');
  banner.textContent = field === 'origin'
    ? 'Tap the map to set your starting point'
    : 'Tap the map to set your destination';
  banner.style.display = 'block';
  toast('Tap anywhere on the map');
}

function cancelPin() {
  pinMode = null;
  document.getElementById('pin-mode').style.display  = 'none';
  document.getElementById('pin-banner').style.display = 'none';
}

function onMapClick(e) {
  const { lat, lng } = e.latlng;

  // If in explicit pin mode, use that field
  if (pinMode) {
    const field = pinMode;
    cancelPin();
    reverseGeocode(lat, lng).then(name => {
      document.getElementById(field + '-input').value = name;
    });
    selectPlace(field, lat, lng, lat.toFixed(4) + ', ' + lng.toFixed(4));
    return;
  }

  // Smart click: set origin first, then destination
  const field = !originCoords ? 'origin' : 'dest';
  reverseGeocode(lat, lng).then(name => {
    document.getElementById(field + '-input').value = name;
  });
  selectPlace(field, lat, lng, lat.toFixed(4) + ', ' + lng.toFixed(4));

  if (field === 'origin') {
    toast('Starting point set — now tap your destination');
  } else {
    toast('Destination set — tap "Find Accessible Route"');
  }
}

async function reverseGeocode(lat, lon) {
  try {
    const resp = await fetch(
      `${NOMINATIM}/reverse?lat=${lat}&lon=${lon}&format=json`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await resp.json();
    const parts = [d.address?.road, d.address?.suburb].filter(Boolean);
    return parts.length ? parts.join(', ') : `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  } catch {
    return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  }
}

// ── Markers ───────────────────────────────────────────────────────────────────
function placeMarker(field, lat, lon) {
  if (field === 'origin' && originMarker) map.removeLayer(originMarker);
  if (field === 'dest'   && destMarker)   map.removeLayer(destMarker);

  const color = field === 'origin' ? '#2ecc71' : '#e74c3c';
  const icon = L.divIcon({
    html: `<div style="width:16px;height:16px;border-radius:50%;
                background:${color};border:3px solid #fff;
                box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>`,
    iconSize: [16, 16], iconAnchor: [8, 8], className: ''
  });

  const marker = L.marker([lat, lon], { icon }).addTo(map);
  if (field === 'origin') originMarker = marker;
  else                    destMarker   = marker;

  map.panTo([lat, lon]);
}

function checkRouteReady() {
  document.getElementById('route-btn').disabled = !(originCoords && destCoords);
  // Update map tap hint
  const hint = !originCoords ? 'Tap map: set start' : !destCoords ? 'Tap map: set destination' : '';
  const toastEl = document.getElementById('toast');
  // Update input row borders to show which is active
  document.getElementById('origin-row').style.borderColor =
    !originCoords ? 'rgba(46,204,113,0.5)' : 'rgba(255,255,255,0.07)';
  document.getElementById('dest-row').style.borderColor =
    originCoords && !destCoords ? 'rgba(231,76,60,0.5)' : 'rgba(255,255,255,0.07)';
}

// ── Routing ───────────────────────────────────────────────────────────────────
async function getRoute() {
  if (!originCoords || !destCoords) return;

  document.getElementById('route-btn').disabled = true;
  document.getElementById('route-btn').textContent = 'Finding route...';

  try {
    const [oLat, oLon] = originCoords;
    const [dLat, dLon] = destCoords;
    const url = `${OSRM_BASE}/${oLon},${oLat};${dLon},${dLat}?overview=full&geometries=geojson&steps=true`;

    const resp = await fetch(url);
    const data = await resp.json();

    if (!data.routes || !data.routes.length) {
      toast('No route found between these points');
      return;
    }

    const route = data.routes[0];
    displayRoute(route);

  } catch (e) {
    toast('Routing failed — check your connection');
    console.error(e);
  } finally {
    document.getElementById('route-btn').disabled = false;
    document.getElementById('route-btn').textContent = 'Find Accessible Route';
  }
}

function displayRoute(route) {
  routeLayer.clearLayers();
  // Dim street overlay so the route stands out
  streetLayer.eachLayer(l => l.setStyle && l.setStyle({ opacity: 0.25 }));

  const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
  const distKm = (route.distance / 1000).toFixed(1);

  // Draw route — thick white casing + bold blue line, always on top
  L.polyline(coords, {
    color: '#ffffff', weight: 11, opacity: 0.9
  }).addTo(routeLayer);

  const blueLine = L.polyline(coords, {
    color: '#2563eb', weight: 7, opacity: 1
  }).addTo(routeLayer);

  blueLine.bringToFront();

  // Analyze safety of route
  const safety = analyzeRouteSafety(route.geometry.coordinates);

  // ── Realistic wheelchair time estimate ──────────────────────────────────────
  // Base: OSRM pedestrian duration (seconds)
  // Wheelchair speed factors vs walking:
  //   Accessible route (>=80% safe):  2.0x — smooth surfaces, gentle slopes
  //   Mixed route (50-80% safe):      3.0x — some barriers to navigate around
  //   Difficult route (<50% safe):    4.5x — frequent barriers, rough terrain
  // Additional penalty if steps detected: +20%
  const safeRatioForTime = safety.safeRatio;
  const baseFactor = safeRatioForTime >= 0.8 ? 2.0
                   : safeRatioForTime >= 0.5 ? 3.0
                   : 4.5;
  const stepsPenalty = safety.hasSteps ? 1.2 : 1.0;
  const totalFactor  = baseFactor * stepsPenalty;
  const timeMin      = Math.ceil(route.duration / 60 * totalFactor);

  // Update stats
  document.getElementById('stat-dist').textContent = distKm + ' km';
  document.getElementById('stat-time').textContent = timeMin + ' min';

  const safetyPct = Math.round(safety.safeRatio * 100);
  document.getElementById('stat-safety').textContent = safetyPct + '%';
  document.getElementById('stat-safety').style.color =
    safetyPct >= 70 ? '#2ecc71' : safetyPct >= 40 ? '#f39c12' : '#e74c3c';
  document.getElementById('safety-pct').textContent = safetyPct + '%';

  const fill = document.getElementById('safety-fill');
  fill.style.width = safetyPct + '%';
  fill.style.background = safetyPct >= 70 ? '#2ecc71' : safetyPct >= 40 ? '#f39c12' : '#e74c3c';

  // Warnings
  const warnings = document.getElementById('route-warnings');
  warnings.innerHTML = '';

  if (safetyPct >= 80) {
    warnings.innerHTML += '<span class="ok-chip">Mostly accessible</span>';
    warnings.innerHTML += '<span class="ok-chip">Easy for wheelchair</span>';
  } else if (safetyPct >= 50) {
    warnings.innerHTML += '<span class="warn-chip">Moderate difficulty</span>';
  } else {
    warnings.innerHTML += '<span class="warn-chip">Difficult for wheelchair</span>';
  }
  if (safety.unsafeSegments > 0) {
    warnings.innerHTML += `<span class="warn-chip">${safety.unsafeSegments} barrier${safety.unsafeSegments > 1 ? 's' : ''} on route</span>`;
  }
  if (safety.hasSteps) {
    warnings.innerHTML += '<span class="warn-chip">Steps detected</span>';
  }
  if (distKm > 3) {
    warnings.innerHTML += '<span class="warn-chip">Long route</span>';
  }
  if (safetyPct >= 80 && safety.unsafeSegments === 0) {
    warnings.innerHTML += '<span class="ok-chip">No major barriers</span>';
  }

  document.getElementById('route-card').style.display = 'block';

  // Fit map to route
  map.fitBounds(L.polyline(coords).getBounds(), { padding: [80, 80] });
}

function analyzeRouteSafety(routeCoords) {
  // Binary lookup: is this route point on a known unsafe street cell?
  // Cell size 0.001 deg (~100m). Check centre cell + immediate neighbours
  // (route GPS and street GPS may be 1 cell off) but count as single hit.
  const cs = safetyGridCellSize || 0.001;
  const hasGrid = safetyGrid.unsafe.size > 0;

  let unsafeCount = 0, totalChecked = 0;
  let hasSteps = false;

  // Sample evenly — up to 50 points for accuracy
  const step = Math.max(1, Math.floor(routeCoords.length / 50));

  for (let i = 0; i < routeCoords.length; i += step) {
    const [rLon, rLat] = routeCoords[i];
    totalChecked++;

    if (!hasGrid) continue;

    // Check centre cell first (exact match)
    const cLat = Math.round(rLat / cs);
    const cLon = Math.round(rLon / cs);
    let isUnsafe = false;

    // Check 3x3 neighbourhood but only count ONCE per route point
    outer:
    for (let dlat = -1; dlat <= 1; dlat++) {
      for (let dlon = -1; dlon <= 1; dlon++) {
        const key = ((cLat + dlat) * cs).toFixed(4) + ',' + ((cLon + dlon) * cs).toFixed(4);
        if (safetyGrid.unsafe.has(key)) {
          isUnsafe = true;
          if (safetyGrid.steps.has(key)) hasSteps = true;
          break outer;
        }
      }
    }

    if (isUnsafe) unsafeCount++;
  }

  const safeRatio = totalChecked > 0 ? 1 - (unsafeCount / totalChecked) : 0.73;
  return { safeRatio, unsafeSegments: unsafeCount, hasSteps };
}

function findNearestStreet(lat, lon) {
  let nearest = null, minDist = Infinity;
  const searchRadius = 0.005;
  for (const feat of allStreets) {
    for (const [fLon, fLat] of feat.geometry.coordinates) {
      if (Math.abs(fLat - lat) > searchRadius || Math.abs(fLon - lon) > searchRadius) continue;
      const d = Math.sqrt((fLat - lat) ** 2 + (fLon - lon) ** 2);
      if (d < minDist) { minDist = d; nearest = feat; }
    }
  }
  return nearest;
}

// Check if a route point (lat, lon) is ON an unsafe street
function isNearUnsafeStreet(lat, lon) {
  const cs = safetyGridCellSize || 0.001;
  if (safetyGrid.unsafe.size > 0) {
    // Use grid — check just the exact cell (tight match)
    const cellLat = (Math.round(lat / cs) * cs).toFixed(4);
    const cellLon = (Math.round(lon / cs) * cs).toFixed(4);
    return safetyGrid.unsafe.has(cellLat + ',' + cellLon);
  }
  // Fallback to allStreets
  const TIGHT = 0.00015;
  for (const feat of allStreets) {
    if (feat.properties.l !== 1) continue;
    for (const [fLon, fLat] of feat.geometry.coordinates) {
      if (Math.abs(fLat - lat) > TIGHT || Math.abs(fLon - lon) > TIGHT) continue;
      return true;
    }
  }
  return false;
}

function clearRoute() {
  routeLayer.clearLayers();
  document.getElementById('route-card').style.display = 'none';
  // Restore street overlay
  renderStreets(currentFeatures);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initMap();
  loadStreets();
});
</script>
